<!DOCTYPE html>
<!-- Minimalist media player interface styled with Tailwind CSS, featuring modern typography and soft hover animations -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimal Media Player</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; }
</style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
<div class="w-80 p-6 bg-white rounded-xl shadow space-y-4">
    <audio id="audio" src="media/sample.mp3" preload="metadata" class="hidden"></audio>
    <div class="flex items-center space-x-4">
        <button id="play" aria-label="Play" class="px-4 py-2 bg-gray-200 rounded transition-colors duration-200 hover:bg-gray-300 focus:outline-none focus:ring focus:ring-indigo-500 flex items-center justify-center">
            <!-- Default play icon -->
            <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z" />
            </svg>
        </button>
        <span id="currentTime" class="text-sm text-gray-600">0:00</span>
    </div>
    <div id="progress-container" class="w-full h-2 bg-gray-200 rounded cursor-pointer">
        <div id="progress" class="bg-indigo-500 h-full transition-all duration-200" style="width: 0%;"></div>
    </div>
    <input type="range" id="volume" min="0" max="1" step="0.01" value="1" class="w-full transition-colors duration-200">
</div>
<script src="main.js"></script>
</body>
</html>
